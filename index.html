<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>医药政策检索助手</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #f0f2f5;
      font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
    }
    .header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 50px;
      line-height: 50px;
      background: linear-gradient(135deg, #1677ff, #0958d9);
      color: #fff;
      font-size: 17px;
      font-weight: bold;
      text-align: center;
      z-index: 999;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    #coze-chat {
      position: fixed;
      top: 50px;
      left: 0; right: 0; bottom: 0;
      width: 100%;
      height: calc(100% - 50px);
    }
  </style>
</head>
<body>

  <div class="header">🏥 医药政策检索助手</div>
  <div id="coze-chat"></div>

  <script>
    // =============================================
    // ⬇️ 只需修改这两行
    var BOT_ID = '7622230610618597428';       // 替换成你的 Bot ID
    var PAT_TOKEN = 'pat_7YFJIJp8ewUHIdU1JApUelga2PLYIoxeQiwQIfsSbtnlWnQRAqT8NFAxJ3LJubrk'; // 替换成你的 pat_xxxx Token
    // =============================================

    var script = document.createElement('script');
    script.src = 'https://lf-cdn.coze.cn/obj/unpkg/flow-platform/chat-app-sdk/1.0.0-beta.4/libs/cn/index.js';

    script.onload = function () {
      try {
        new CozeWebSDK.WebChatClient({
          config: {
            bot_id: BOT_ID,
          },
          auth: {
            type: 'token',
            token: PAT_TOKEN,
            // ✅ 关键修复：必须提供 onRefreshToken 回调
            onRefreshToken: function () {
              // PAT Token 不会过期，直接返回同一个 token
              return Promise.resolve(PAT_TOKEN);
            },
          },
          ui: {
            base: {
              el: document.getElementById('coze-chat'),
              lang: 'zh-CN',
              layout: 'pc',
            },
            chatBot: {
              name: '医药政策检索助手',
              description: '智能查询医药政策法规条文',
            },
            footer: {
              isShow: false,
            },
          },
        });
        console.log('✅ 初始化成功');
      } catch (e) {
        console.error('❌ 初始化失败:', e);
        document.getElementById('coze-chat').innerHTML =
          '<div style="padding:60px;text-align:center;color:#999;font-size:15px;">' +
          '⚠️ 加载失败，请检查 Bot ID 和 Token<br><br>' +
          '<small>' + e.message + '</small></div>';
      }
    };

    script.onerror = function () {
      document.getElementById('coze-chat').innerHTML =
        '<div style="padding:60px;text-align:center;color:#999;font-size:15px;">' +
        '⚠️ 网络异常，SDK 脚本加载失败，请刷新重试</div>';
    };

    document.head.appendChild(script);
  </script>

</body>
</html>
