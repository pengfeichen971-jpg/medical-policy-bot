<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>医药政策检索助手</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:#f0f2f5;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* 顶部标题栏 */
.header{background:linear-gradient(135deg,#1677ff,#0958d9);color:#fff;padding:12px 16px;text-align:center;font-size:17px;font-weight:bold;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,0.15);display:flex;align-items:center;justify-content:center}
.header-inner{display:flex;flex-direction:column;align-items:center;gap:2px}
.header-sub{font-size:11px;opacity:0.8;font-weight:normal}

/* 消息区域 */
.messages{flex:1;overflow-y:auto;padding:20px 16px;display:flex;flex-direction:column;gap:20px}
.messages::-webkit-scrollbar{width:4px}
.messages::-webkit-scrollbar-thumb{background:#d0d5dd;border-radius:4px}

/* 消息气泡 */
.msg-row{display:flex;flex-direction:column;gap:6px}
.msg-row.user{align-items:flex-end}
.msg-row.bot{align-items:flex-start}
.bubble{max-width:80%;padding:12px 16px;border-radius:16px;font-size:14px;line-height:1.7;word-break:break-word}
.bubble.user{background:linear-gradient(135deg,#1677ff,#0958d9);color:#fff;border-bottom-right-radius:4px}
.bubble.bot{background:#fff;color:#1d2129;border-bottom-left-radius:4px;box-shadow:0 2px 8px rgba(0,0,0,0.08)}
.bubble.loading{color:#86909c;background:#fff}

/* 文件预览 */
.file-preview-bubble{max-width:80%;background:#fff;border-radius:12px;padding:10px 14px;border:1px solid #e5e6eb;display:flex;align-items:center;gap:10px;box-shadow:0 1px 4px rgba(0,0,0,0.06);margin-bottom:4px}
.file-preview-bubble .f-icon{font-size:26px;flex-shrink:0}
.file-preview-bubble .f-info .f-name{font-size:13px;font-weight:500;color:#1d2129;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-preview-bubble .f-info .f-size{font-size:11px;color:#86909c;margin-top:2px}
.img-preview-bubble{max-width:60%;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.1);margin-bottom:4px}
.img-preview-bubble img{width:100%;display:block;max-height:200px;object-fit:cover}

/* Markdown */
.bubble.bot h1,.bubble.bot h2,.bubble.bot h3{color:#1d2129;margin:12px 0 6px;font-weight:bold}
.bubble.bot h1{font-size:17px;border-bottom:2px solid #e5e6eb;padding-bottom:6px}
.bubble.bot h2{font-size:15px}
.bubble.bot h3{font-size:14px;color:#1677ff}
.bubble.bot p{margin:6px 0}
.bubble.bot ul,.bubble.bot ol{padding-left:20px;margin:6px 0}
.bubble.bot li{margin:4px 0}
.bubble.bot strong{color:#1d2129;font-weight:600}
.bubble.bot blockquote{border-left:3px solid #1677ff;padding:6px 12px;background:#f0f7ff;border-radius:0 8px 8px 0;margin:8px 0;color:#4e5969}
.bubble.bot code{background:#f2f3f5;padding:2px 6px;border-radius:4px;font-size:13px;font-family:monospace;color:#c7254e}
.bubble.bot pre{background:#1d2129;border-radius:8px;padding:12px;margin:8px 0;overflow-x:auto}
.bubble.bot pre code{background:none;color:#e8e8e8;padding:0;font-size:13px}
.bubble.bot table{width:100%;border-collapse:collapse;margin:8px 0;font-size:13px}
.bubble.bot th{background:#f0f7ff;color:#1677ff;padding:8px;border:1px solid #d6e8ff;text-align:left}
.bubble.bot td{padding:8px;border:1px solid #e5e6eb}
.bubble.bot tr:nth-child(even) td{background:#f9fafc}
.bubble.bot hr{border:none;border-top:1px solid #e5e6eb;margin:10px 0}
.bubble.bot a{color:#1677ff;text-decoration:none}
.bubble.bot a:hover{text-decoration:underline}

/* 操作按钮 */
.msg-actions{display:flex;gap:6px;opacity:0;transition:opacity 0.2s;padding:0 4px}
.msg-row:hover .msg-actions{opacity:1}
.msg-row.user .msg-actions{justify-content:flex-end}
.msg-row.bot .msg-actions{justify-content:flex-start}
.action-btn{display:flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;border:1px solid #e5e6eb;background:#fff;color:#86909c;font-size:12px;cursor:pointer;transition:all 0.15s}
.action-btn:hover{background:#f0f7ff;border-color:#1677ff;color:#1677ff}
.action-btn.copied{color:#00b42a;border-color:#00b42a;background:#f0fff4}
.action-btn svg{width:12px;height:12px;flex-shrink:0}

/* 欢迎区域 */
.welcome-area{text-align:center;padding:24px 16px}
.welcome-icon{font-size:48px;margin-bottom:10px}
.welcome-title{font-size:18px;font-weight:bold;color:#1d2129;margin-bottom:6px}
.welcome-desc{font-size:13px;color:#86909c;line-height:1.6;margin-bottom:16px}
.quick-btns{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.quick-btn{background:#fff;border:1px solid #e5e6eb;border-radius:20px;padding:7px 14px;font-size:12px;color:#4e5969;cursor:pointer;transition:all 0.15s}
.quick-btn:hover{border-color:#1677ff;color:#1677ff;background:#f0f7ff}

/* 待发送文件预览条 */
.pending-bar{padding:6px 16px 0;flex-wrap:wrap;gap:6px;display:none}
.pending-bar.show{display:flex}
.pending-chip{display:flex;align-items:center;gap:5px;background:#f0f7ff;border:1px solid #d6e8ff;border-radius:8px;padding:4px 8px;font-size:12px;color:#1677ff;max-width:160px}
.pending-chip span.chip-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.pending-chip .chip-del{cursor:pointer;opacity:0.6;flex-shrink:0;line-height:1}
.pending-chip .chip-del:hover{opacity:1}
.pending-chip img{width:32px;height:32px;border-radius:4px;object-fit:cover;flex-shrink:0}

/* 输入区域 */
.input-wrap{background:#fff;border-top:1px solid #f0f0f0;padding:10px 16px 12px;flex-shrink:0;box-shadow:0 -2px 8px rgba(0,0,0,0.04)}
.input-row{display:flex;gap:8px;align-items:flex-end}
.input-box{display:flex;align-items:flex-end;gap:6px;flex:1;border:1.5px solid #e5e6eb;border-radius:12px;padding:8px 10px;transition:border-color 0.2s;background:#fff}
.input-box:focus-within{border-color:#1677ff;box-shadow:0 0 0 3px rgba(22,119,255,0.08)}
textarea{flex:1;border:none;outline:none;font-size:14px;resize:none;min-height:26px;max-height:120px;font-family:inherit;line-height:1.5;background:transparent;overflow-y:auto}
.attach-btn{width:26px;height:26px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#86909c;border-radius:6px;transition:all 0.15s;flex-shrink:0;border:none;background:transparent;position:relative}
.attach-btn:hover{color:#1677ff;background:#f0f7ff}
.attach-btn svg{width:17px;height:17px}
.send-btn{width:44px;height:44px;background:linear-gradient(135deg,#1677ff,#0958d9);color:#fff;border:none;border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s}
.send-btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(22,119,255,0.35)}
.send-btn:disabled{background:#c9cdd4;transform:none;box-shadow:none;cursor:not-allowed}
.send-btn svg{width:18px;height:18px}
.input-hint{font-size:11px;color:#c9cdd4;margin-top:6px;text-align:center}

/* 上传菜单弹出 */
.attach-menu{position:absolute;bottom:56px;left:12px;background:#fff;border-radius:12px;box-shadow:0 4px 24px rgba(0,0,0,0.13);padding:6px;display:none;z-index:200;min-width:150px}
.attach-menu.show{display:block}
.attach-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;font-size:13px;color:#1d2129;transition:background 0.15s}
.attach-item:hover{background:#f0f7ff;color:#1677ff}
.attach-item svg{width:16px;height:16px;flex-shrink:0}
.overlay{position:fixed;inset:0;z-index:199;display:none}
.overlay.show{display:block}

/* 打字动画 */
@keyframes blink{0%,80%,100%{opacity:0}40%{opacity:1}}
.typing span{display:inline-block;width:6px;height:6px;background:#86909c;border-radius:50%;margin:0 2px;animation:blink 1.2s infinite}
.typing span:nth-child(2){animation-delay:0.2s}
.typing span:nth-child(3){animation-delay:0.4s}

#fileInput,#imgInput{display:none}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div>🏥 医药政策检索助手</div>
    <div class="header-sub">覆盖 NMPA · 医保局 · GMP/GSP · 药品法规</div>
  </div>
</div>

<div class="messages" id="messages">
  <div class="welcome-area">
    <div class="welcome-icon">🏥</div>
    <div class="welcome-title">您好，我是医药政策检索助手</div>
    <div class="welcome-desc">支持文字查询、图片识别、文件智能分析<br>覆盖药品注册、医保政策、GMP/GSP等领域</div>
    <div class="quick-btns">
      <div class="quick-btn" onclick="quickSend('药品委托生产需要满足哪些GMP条件？')">💊 药品委托生产GMP</div>
      <div class="quick-btn" onclick="quickSend('医保乙类药品报销比例如何规定？')">💰 医保报销比例</div>
      <div class="quick-btn" onclick="quickSend('药品不良反应报告时限是多少？')">⚠️ 不良反应报告时限</div>
      <div class="quick-btn" onclick="quickSend('药品注册管理办法最新规定？')">📋 药品注册管理办法</div>
    </div>
  </div>
</div>

<!-- 待发送文件条 -->
<div class="pending-bar" id="pendingBar"></div>

<!-- 遮罩 & 菜单 -->
<div class="overlay" id="overlay" onclick="closeAttach()"></div>
<div class="attach-menu" id="attachMenu">
  <div class="attach-item" onclick="pickImg()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
    图片
  </div>
  <div class="attach-item" onclick="pickFile()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
    文件 (PDF/Word/Excel…)
  </div>
</div>

<div class="input-wrap" style="position:relative">
  <div class="input-row">
    <div class="input-box">
      <button class="attach-btn" onclick="toggleAttach(event)" title="上传文件/图片">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
        </svg>
      </button>
      <textarea id="input" placeholder="输入政策问题，或上传文件进行智能分析..." onkeydown="handleKey(event)" oninput="autoResize(this)" rows="1"></textarea>
    </div>
    <button class="send-btn" id="btn" onclick="send()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
  <div class="input-hint">Enter 发送 · Shift+Enter 换行 · 支持图片 / PDF / Word / Excel / TXT 等</div>
</div>

<input type="file" id="imgInput" accept="image/*" multiple onchange="onFilePick(this,'image')">
<input type="file" id="fileInput" accept=".pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.txt,.csv" multiple onchange="onFilePick(this,'doc')">

<script>
const BOT_ID = '7622230610618597428';
const TOKEN  = 'pat_7YFJIJp8ewUHIdU1JApUelga2PLYIoxeQiwQIfsSbtnlWnQRAqT8NFAxJ3LJubrk'; // ← 替换成你的Token

let convId = null;
let lastUserText = '';
let pending = []; // {file, kind, base64, mime, preview}

/* ─── 文件图标 ─── */
function fileIcon(name){
  const e=name.split('.').pop().toLowerCase();
  return {pdf:'📄',doc:'📝',docx:'📝',xls:'📊',xlsx:'📊',ppt:'📋',pptx:'📋',txt:'📃',csv:'📊'}[e]||'📎';
}
function fmtSize(b){return b<1024?b+'B':b<1048576?(b/1024).toFixed(1)+'KB':(b/1048576).toFixed(1)+'MB'}

/* ─── 上传菜单 ─── */
function toggleAttach(e){
  e.stopPropagation();
  document.getElementById('attachMenu').classList.toggle('show');
  document.getElementById('overlay').classList.toggle('show');
}
function closeAttach(){
  document.getElementById('attachMenu').classList.remove('show');
  document.getElementById('overlay').classList.remove('show');
}
function pickImg(){closeAttach();document.getElementById('imgInput').click()}
function pickFile(){closeAttach();document.getElementById('fileInput').click()}

/* ─── 文件读取 ─── */
function onFilePick(input, kind){
  Array.from(input.files).forEach(file=>{
    const reader=new FileReader();
    reader.onload=ev=>{
      const full=ev.target.result;
      const base64=full.split(',')[1];
      const preview=kind==='image'?full:null;
      pending.push({file,kind,base64,mime:file.type||'application/octet-stream',preview});
      renderPending();
    };
    reader.readAsDataURL(file);
  });
  input.value='';
}

function renderPending(){
  const bar=document.getElementById('pendingBar');
  if(!pending.length){bar.className='pending-bar';bar.innerHTML='';return;}
  bar.className='pending-bar show';
  bar.innerHTML=pending.map((p,i)=>{
    if(p.preview) return `<div class="pending-chip"><img src="${p.preview}"><span class="chip-name">${p.file.name}</span><span class="chip-del" onclick="delPending(${i})">✕</span></div>`;
    return `<div class="pending-chip"><span>${fileIcon(p.file.name)}</span><span class="chip-name">${p.file.name}</span><span class="chip-del" onclick="delPending(${i})">✕</span></div>`;
  }).join('');
}
function delPending(i){pending.splice(i,1);renderPending()}

/* ─── SVG ─── */
function svgCopy(){return`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>`}
function svgOk(){return`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>`}
function svgRegen(){return`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>`}

function copyText(t,btn){
  navigator.clipboard.writeText(t).then(()=>{
    btn.classList.add('copied');btn.innerHTML=svgOk()+' 已复制';
    setTimeout(()=>{btn.classList.remove('copied');btn.innerHTML=svgCopy()+' 复制'},2000);
  });
}

/* ─── 消息渲染 ─── */
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px'}
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}}
function quickSend(t){document.getElementById('input').value=t;send()}

function addUserMsg(text, files){
  const row=document.createElement('div');
  row.className='msg-row user';
  let html='';
  (files||[]).forEach(f=>{
    if(f.preview) html+=`<div class="img-preview-bubble"><img src="${f.preview}" alt="${f.file.name}"></div>`;
    else html+=`<div class="file-preview-bubble"><div class="f-icon">${fileIcon(f.file.name)}</div><div class="f-info"><div class="f-name">${f.file.name}</div><div class="f-size">${fmtSize(f.file.size)}</div></div></div>`;
  });
  if(text) html+=`<div class="bubble user">${text.replace(/\n/g,'<br>')}</div>`;
  html+=`<div class="msg-actions"><button class="action-btn" onclick="copyText('${(text||'').replace(/'/g,"\\'")}',this)">${svgCopy()} 复制</button></div>`;
  row.innerHTML=html;
  document.getElementById('messages').appendChild(row);
  row.scrollIntoView({behavior:'smooth'});
}

function addBotMsg(html,raw){
  const row=document.createElement('div');
  row.className='msg-row bot';
  row.innerHTML=`<div class="bubble bot">${html}</div>
    <div class="msg-actions">
      <button class="action-btn" onclick="copyText(this.dataset.raw,this)" data-raw="">${svgCopy()} 复制</button>
      <button class="action-btn regen">${svgRegen()} 重新生成</button>
    </div>`;
  row.querySelector('[data-raw]').dataset.raw=raw;
  document.getElementById('messages').appendChild(row);
  row.scrollIntoView({behavior:'smooth'});
  row.querySelector('.regen').onclick=()=>{row.remove();send(lastUserText,[])};
  return row;
}

function addLoading(){
  const row=document.createElement('div');
  row.className='msg-row bot';
  row.innerHTML=`<div class="bubble bot loading"><div class="typing"><span></span><span></span><span></span></div></div>`;
  document.getElementById('messages').appendChild(row);
  row.scrollIntoView({behavior:'smooth'});
  return row;
}

/* ─── 构建API消息内容 ─── */
function buildContent(text, files){
  if(!files||!files.length) return {content:text||'请分析文件',content_type:'text'};
  const parts=[];
  files.forEach(f=>{
    if(f.kind==='image'){
      parts.push({type:'image',image_url:{url:`data:${f.mime};base64,${f.base64}`}});
    } else {
      parts.push({type:'file',file_url:{url:`data:${f.mime};base64,${f.base64}`,name:f.file.name}});
    }
  });
  parts.push({type:'text',text:text||'请帮我分析以上文件内容，结合医药政策知识库给出专业解读。'});
  return {content:JSON.stringify(parts),content_type:'object_string'};
}

/* ─── 发送 ─── */
async function send(overText, overFiles){
  const inp=document.getElementById('input');
  const btn=document.getElementById('btn');
  const text=overText!==undefined?overText:inp.value.trim();
  const files=overFiles!==undefined?overFiles:[...pending];
  if(!text&&!files.length) return;

  lastUserText=text;
  inp.value='';autoResize(inp);btn.disabled=true;
  pending=[];renderPending();

  const welcome=document.querySelector('.welcome-area');
  if(welcome) welcome.remove();

  addUserMsg(text,files);
  const loading=addLoading();

  try{
    const {content,content_type}=buildContent(text,files);
    const r=await fetch('https://api.coze.cn/v3/chat',{
      method:'POST',
      headers:{'Authorization':'Bearer '+TOKEN,'Content-Type':'application/json'},
      body:JSON.stringify({
        bot_id:BOT_ID,user_id:'u001',stream:false,auto_save_history:true,
        conversation_id:convId||undefined,
        additional_messages:[{role:'user',content,content_type}]
      })
    });
    const d=await r.json();
    if(d.code!==0){loading.querySelector('.bubble').textContent='错误：'+(d.msg||'请求失败');btn.disabled=false;return;}
    convId=d.data.conversation_id;
    const cid=d.data.id;
    let answer='';
    for(let i=0;i<40;i++){
      await new Promise(r=>setTimeout(r,1500));
      const mr=await fetch(`https://api.coze.cn/v3/chat/message/list?chat_id=${cid}&conversation_id=${convId}`,
        {headers:{'Authorization':'Bearer '+TOKEN}});
      const md=await mr.json();
      if(md.code===0&&md.data){
        const a=md.data.find(m=>m.role==='assistant'&&m.type==='answer');
        if(a){answer=a.content;break;}
      }
    }
    loading.remove();
    addBotMsg(marked.parse(answer||'未获取到回复，请重试'),answer);
  }catch(e){
    loading.querySelector('.bubble').textContent='网络错误，请检查连接后重试';
  }
  btn.disabled=false;
}
</script>
</body>
</html>
