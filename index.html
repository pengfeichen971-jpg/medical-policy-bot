  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }

      position: fixed;
      top: 0; left: 0; right: 0;
      height: 50px;
      line-height: 50px;

    iframe {
      position: fixed;
